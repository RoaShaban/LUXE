<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!--font awsome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--Font family-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <!--bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--custome css-->
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="stylesheet" href="./assets/css/product_details.css" />
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg py-3">
            <div class="container">
                <a class="navbar-brand me-auto" href="#">LUXE</a>
                <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                    aria-labelledby="offcanvasNavbarLabel">
                    <div class="offcanvas-header">
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav m-auto mb-2 mb-lg-0 d-flex gap-4">
                            <li class="nav-item">
                                <a class="nav-link" aria-current="page" href="./index.html">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Catalog</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">New Arrivals</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Collection</a>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="shopping-bag">
                    <a href="#"><i class="fa-solid fa-bag-shopping"></i></a>
                </div>
                <div class="toggle-list ms-3">
                    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main>

        <section class="details py-5">
            <div class="container">
                <div class="row g-0 g-md-5">
                    <div class="product-img col-12 col-sm-6 text-center">
                        <div class="thumbnail mb-3">
                        </div>
                        <div class="images">
                            <div class="row d-none d-sm-flex g-2">
                                <div class="image col-4">
                                    <img src="./assets/images/product.webp" width="100%" height="auto" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="product-info d-flex flex-column justify-content-between gap-4 col-6">
                        <h1 class="name">Product Name</h1>
                        <p class="description">Description</p>
                        <span class="stock">In Stock</span>
                        <span class="rating">rating</span>
                        <span class="price">price</span>
                        <div class="reviews d-none d-xl-block d-xxl-flex gap-4">
                            <div class="review d-flex align-items-center">
                                <i class="fa-solid fa-user"></i>
                                <div class="review-info">
                                    <p class="comment">dbrtthkigjgjgjbjvjf</p </div>
                                </div>
                            </div>
                        </div>
                        <a href="#" class="btn btn-primary add-to-cart">Add To Cart</a>
                    </div>
                </div>
        </section>

    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./assets/js/product_details.js"></script>
</body>

</html>
