<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!--font awsome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--Font family-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">


    <!--swiper-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <!--bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--custome css-->
    <link rel="stylesheet" href="./assets/css/main.css" />
</head>

<header>
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand me-auto" href="#">LUXE</a>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header">
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav m-auto mb-2 mb-lg-0 d-flex gap-4">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Catalog</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">New Arrivals</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Collection</a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="shopping-bag">
                <a href="#"><i class="fa-solid fa-bag-shopping"></i></a>
            </div>
            <div class="toggle-list ms-3">
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </nav>
</header>

<main>

    <section class="hero">
        <div class="container py-5">
            <div
                class="d-flex flex-column justify-content-center align-items-center gap-2 gap-sm-4 text-white text-center">
                <h1>Explore Our Collections</h1>
                <p>Browse products by category —<br />find exactly what you're looking for within our curated selection
                    of
                    high-performance items.</p>
                <a class="btn" href="#">Shop Now</a>
                <svg class="horizontal-rule mt-2 mt-sm-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100">
                    <path fill="#FFFFFF"
                        d="M930 50c0-8 7-15 15-15a25 25 0 0 0-45 11h-1c-1-6-7-11-14-11l5 11h-1c-1-6-7-11-14-11l4 7c-6-4-13-2-15 4H509c0-4 2-8 5-11-7 0-12 4-14 10-3-6-8-10-14-10 2 3 4 7 4 11H136c-2-6-9-8-15-4l4-7c-7 0-13 5-14 11h-1l5-11c-7 0-13 5-14 11h-1c-4-22-32-29-45-11a15 15 0 0 1 0 30c13 18 41 11 45-11h1c1 6 7 11 14 11l-5-11h1c1 6 7 11 14 11l-4-7c6 4 13 2 15-4h354c0 4-2 8-5 11 7 0 12-4 14-10 3 6 8 10 14 10-2-3-4-7-4-11h355c2 6 9 8 15 4l-4 7c7 0 13-5 14-11h1l-5 11c7 0 13-5 14-11h1c4 22 32 29 45 11-8 0-15-7-15-15Z">
                    </path>
                </svg>
            </div>
        </div>


    </section>

    <section class="categories py-5">
        <div class="container">
            <div class="categories-list">
                <div class="swiper mySwiper">
                    <div class="swiper-wrapper">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="products">
        <div class="container">
            <div class="row g-4 g-md-3">
                <div class="col-12 col-md-4 col-xl-3">
                    <div class="card m-auto">
                        <img src="./assets/images/product.webp" class="card-img-top w-100 h-auto" alt="product image">
                        <div class="card-body d-flex flex-column gap-3">
                            <div class="product-info d-flex justify-content-between align-items-center">
                                <h2>product name</h2>
                                <span class="price">Price</span>
                            </div>
                            <span class="rating d-flex align-items-center gap-1 mb-1">
                                <i class="fa-regular fa-star"></i>
                                <span>4.5</span>
                            </span>
                            <a href="#" class="btn btn-primary add-to-cart">Add To Cart</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</main>

<body>


    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./assets/js/main.js"></script>
</body>

</html>
